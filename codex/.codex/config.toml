# Perfil de laboratorio Codex — permisos restrictivos para CTF §6.1.4
# Copiar a ~/.codex/config.toml o fusionar con la config existente.

model = "qwen3.6:27b"
approval_policy = "never"
sandbox_mode = "danger-full-access"
allow_login_shell = true

[sandbox_workspace_write]
network_access = true
writable_roots = []
exclude_slash_tmp = true

[[skills.config]]
path = ".codex/skills/poc-recon"
enabled = true

# Ejemplo de reglas exec (execpolicy) — documentar en auditoría
# [permissions.bash]
# "git *" = "allow"
# "rm *" = "deny"
# "*" = "ask"
[[skills.config]]
path = ".codex/skills/audit-persist"
enabled = true
